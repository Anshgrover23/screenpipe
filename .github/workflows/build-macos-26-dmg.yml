name: Build macOS 26 DMG

on:
  workflow_dispatch:
  push:

concurrency:
  group: build-macos-26-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dmg:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          rustflags: ""
          target: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/screenpipe-app-tauri/src-tauri
          shared-key: screenpipe-tauri-macos-26-dmg
      - name: Install frontend dependencies
        working-directory: apps/screenpipe-app-tauri
        shell: bash
        run: bun install

      - name: Use production config for release
        shell: bash
        run: cp apps/screenpipe-app-tauri/src-tauri/tauri.prod.conf.json apps/screenpipe-app-tauri/src-tauri/tauri.conf.json

      - name: Set macOS deployment target
        shell: bash
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
          echo "Setting MACOSX_DEPLOYMENT_TARGET=10.15 for std::filesystem support"

      - name: Fail if Apple Intelligence SDK support is missing
        id: detect-xcode
        shell: bash
        run: |
          # Re-enabled: weak-linking fix in binary crate build.rs ensures
          # FoundationModels.framework is LC_LOAD_WEAK_DYLIB (not LC_LOAD_DYLIB).
          # DYLD skips the framework on macOS < 26 instead of crashing.
          # Runtime guard (is_macos_26_or_later) prevents any FFI calls.
          # Tested: binary built on macOS 26 SDK runs on macOS 15.5 without crash.
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path 2>/dev/null || echo "")
          SDK_SETTINGS="${SDK_PATH}/SDKSettings.json"
          if [ -f "$SDK_SETTINGS" ] && grep -q '"26\.' "$SDK_SETTINGS"; then
            echo "has_apple_intelligence=true" >> $GITHUB_OUTPUT
            echo "🧠 macOS 26+ SDK detected — Apple Intelligence enabled"
          elif [ -d "${SDK_PATH}/System/Library/Frameworks/FoundationModels.framework" ]; then
            echo "has_apple_intelligence=true" >> $GITHUB_OUTPUT
            echo "🧠 FoundationModels.framework found — Apple Intelligence enabled"
          else
            echo "has_apple_intelligence=false" >> $GITHUB_OUTPUT
            echo "ERROR: macOS SDK < 26 — Apple Intelligence not available"
            exit 1
          fi

      - name: Build DMG
        working-directory: apps/screenpipe-app-tauri
        shell: bash
        env:
          CI: false
        run: |
          bun tauri build \
            --features metal,official-build,apple-intelligence \
            --no-sign \
            --bundles dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-macos-26-dmg-${{ github.run_id }}
          path: apps/screenpipe-app-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 14
